name: Mirror to JuGit

on:
  push:
    branches: ['**']
    tags: ['**']
  delete:                  
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:       

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full mirror
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      
          fetch-tags: true   

      - name: Push mirror to JuGit
        env:
         
          JUGIT_URL: ${{ secrets.JUGIT_REPO_URL }}
        run: |
          
          echo "Token length: ${#GITLAB_TOKEN}"
          echo "JuGit URL: ${JUGIT_URL}"

          
          REMOTE="https://oauth2:${GITLAB_TOKEN}@${JUGIT_URL#https://}"
          git remote add jugit "$REMOTE"
              
          git push --prune --all jugit

          
          git push --tags jugit
